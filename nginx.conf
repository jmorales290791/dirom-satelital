# DIROM SATELITAL - Configuración Nginx
# Copiar a: /etc/nginx/sites-available/dirom-satelital
# Luego: ln -s /etc/nginx/sites-available/dirom-satelital /etc/nginx/sites-enabled/
# Luego: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name TU_DOMINIO.com;  # Cambiar por tu dominio o IP

    # Redirect HTTP to HTTPS (descomentar cuando tengas SSL)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket support
    location /ws {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

