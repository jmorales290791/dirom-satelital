<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIROM SATELITAL - Iniciar Sesión</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .login-loading {
      display: none;
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
      margin-top: 12px;
    }
    .login-loading.show { display: block; }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--primary-light);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-logo">
        <div class="icon">🛰️</div>
        <h1>DIROM</h1>
        <p class="subtitle">Satelital</p>
      </div>

      <div class="login-error" id="loginError"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" autocomplete="username" required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">
          Iniciar Sesión
        </button>

        <div class="login-loading" id="loginLoading">
          <span class="spinner"></span> Verificando credenciales...
        </div>
      </form>
    </div>
  </div>

  <script>
    // Si ya hay token, redirigir al dashboard
    if (localStorage.getItem('token')) {
      window.location.href = '/dashboard.html';
    }

    const form = document.getElementById('loginForm');
    const errorDiv = document.getElementById('loginError');
    const loadingDiv = document.getElementById('loginLoading');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Por favor completa todos los campos');
        return;
      }

      // Mostrar loading
      loginBtn.disabled = true;
      loginBtn.textContent = 'Verificando...';
      loadingDiv.classList.add('show');
      errorDiv.classList.remove('show');

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          showError(data.error || 'Error al iniciar sesión');
          return;
        }

        // Guardar token y datos del usuario
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        // Redirigir al dashboard
        window.location.href = '/dashboard.html';
      } catch (err) {
        showError('Error de conexión. Verifica tu conexión a internet.');
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Iniciar Sesión';
        loadingDiv.classList.remove('show');
      }
    });

    function showError(message) {
      errorDiv.textContent = message;
      errorDiv.classList.add('show');
    }
  </script>
</body>
</html>
